<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAN SAN GEAR — Apply for Creative</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    @font-face {
      font-family: 'ElzaTextTrial';
      src: url('elza-trial/ElzaTextTrial-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --black: #0a0a0a;
      --charcoal: #2c2c2c;
      --dark-gray: #4a4a4a;
      --mid-gray: #8a8a8a;
      --off-white: #f5f5f3;
      --white: #fafafa;
      --font-en: 'ElzaTextTrial', sans-serif;
      --font-kr: 'Pretendard', sans-serif;
    }
    body {
      font-family: var(--font-kr);
      background: #fff;
      color: var(--black);
      opacity: 0;
      animation: fadeIn 0.4s ease forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }
    .apply-wrap {
      display: flex;
      min-height: 100vh;
      max-width: 1200px;
      margin: 0 auto;
      padding: 4rem 3rem;
      gap: 4rem;
    }
    .apply-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-right: 2rem;
    }
    .apply-logo {
      font-family: var(--font-en);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--black);
      margin-bottom: 3rem;
    }
    .apply-title {
      font-family: var(--font-kr);
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 300;
      color: var(--black);
      margin-bottom: 1rem;
    }
    .apply-position {
      font-family: var(--font-en);
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--mid-gray);
    }
    .apply-right {
      flex: 1.2;
      display: flex;
      flex-direction: column;
    }
    .apply-form-title {
      font-family: var(--font-en);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mid-gray);
      margin-bottom: 2rem;
    }
    .apply-field { margin-bottom: 1.2rem; }
    .apply-field label {
      display: block;
      font-family: var(--font-kr);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--charcoal);
      margin-bottom: 0.4rem;
    }
    .apply-field input[type="text"],
    .apply-field input[type="email"],
    .apply-field input[type="tel"],
    .apply-field input[type="url"] {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #ddd;
      font-family: var(--font-kr);
      font-size: 0.85rem;
      background: #fff;
      outline: none;
      transition: border-color 0.3s ease;
    }
    .apply-field input:focus { border-color: var(--black); }
    .apply-row { display: flex; gap: 1rem; }
    .apply-row .apply-field { flex: 1; }
    .apply-file-area {
      border: 1px dashed #ccc;
      padding: 1.5rem;
      text-align: center;
    }
    .apply-file-area input[type="file"] {
      width: 100%;
      font-family: var(--font-kr);
      font-size: 0.8rem;
      color: var(--dark-gray);
    }
    .apply-file-area p {
      font-family: var(--font-en);
      font-size: 0.65rem;
      color: var(--mid-gray);
      margin-top: 0.5rem;
    }
    .apply-submit {
      width: 100%;
      padding: 1rem;
      background: #0a0a0a;
      color: #fff;
      font-family: var(--font-kr);
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      border: none;
      cursor: pointer;
      margin-top: 1.5rem;
      transition: opacity 0.3s ease;
    }
    .apply-submit:hover { opacity: 0.8; }
    @media (max-width: 768px) {
      .apply-wrap { flex-direction: column; padding: 3rem 1.5rem; gap: 2rem; }
      .apply-left { padding-right: 0; }
    }
  </style>
</head>
<body>
  <div class="apply-wrap">
    <div class="apply-left">
      <p class="apply-logo">San San Gear</p>
      <p class="apply-title">지원하기</p>
      <p class="apply-position">Creative</p>
    </div>
    <div class="apply-right" id="applyContent">
      <p class="apply-form-title">SAN SAN GEAR 지원서</p>
      <form id="applyForm" enctype="multipart/form-data">
        <div class="apply-field">
          <label>직종</label>
          <input type="text" name="직종" value="Creative" readonly>
        </div>
        <div class="apply-row">
          <div class="apply-field">
            <label>성 *</label>
            <input type="text" name="성" required>
          </div>
          <div class="apply-field">
            <label>이름 *</label>
            <input type="text" name="이름" required>
          </div>
        </div>
        <div class="apply-row">
          <div class="apply-field">
            <label>Email *</label>
            <input type="email" name="email" required>
          </div>
          <div class="apply-field">
            <label>Phone *</label>
            <input type="tel" name="전화번호" required pattern="[0-9\-]+" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9\-]/g,'')">
          </div>
        </div>
        <div class="apply-row">
          <div class="apply-field">
            <label>SNS Link *</label>
            <input type="url" name="SNS" required>
          </div>
          <div class="apply-field">
            <label>Other links</label>
            <input type="url" name="기타링크">
          </div>
        </div>
        <div class="apply-field">
          <label>자기소개서 *</label>
          <div class="apply-file-area">
            <input type="file" name="자기소개서" accept=".pdf,.doc,.docx" required>
            <p>PDF, DOC, DOCX / 10MB 이하</p>
          </div>
        </div>
        <div class="apply-field">
          <label>이력서</label>
          <div class="apply-file-area">
            <input type="file" name="이력서" accept=".pdf,.doc,.docx">
            <p>PDF, DOC, DOCX / 10MB 이하</p>
          </div>
        </div>
        <div class="apply-field">
          <label>포트폴리오</label>
          <div class="apply-file-area">
            <input type="file" name="포트폴리오" accept=".pdf,.doc,.docx,.zip,.jpg,.png">
            <p>PDF, DOC, DOCX, ZIP, JPG, PNG / 100MB 이하</p>
          </div>
        </div>
        <button type="submit" class="apply-submit">Submit →</button>
      </form>
    </div>
  </div>
  <script>
    document.getElementById('applyForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const form = e.target;
      const MB = 1024 * 1024;
      const f1 = form.querySelector('[name="자기소개서"]').files[0];
      const f2 = form.querySelector('[name="이력서"]').files[0];
      const f3 = form.querySelector('[name="포트폴리오"]').files[0];
      if (f1 && f1.size > 10 * MB) { alert('자기소개서는 10MB 이하의 파일만 첨부 가능합니다.'); return; }
      if (f2 && f2.size > 10 * MB) { alert('이력서는 10MB 이하의 파일만 첨부 가능합니다.'); return; }
      if (f3 && f3.size > 100 * MB) { alert('포트폴리오는 100MB 이하의 파일만 첨부 가능합니다.'); return; }
      const data = new FormData(form);
      const submitBtn = form.querySelector('button[type="submit"]');
      submitBtn.textContent = '제출 중...';
      submitBtn.disabled = true;
      try {
        const res = await fetch('https://formspree.io/f/xzdkzjpd', {
          method: 'POST', body: data, headers: { 'Accept': 'application/json' }
        });
        if (res.ok) {
          document.getElementById('applyContent').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;min-height:60vh;flex-direction:column;gap:2rem;text-align:center;"><p style="font-family:var(--font-en);font-size:0.7rem;letter-spacing:0.3em;color:var(--mid-gray);">APPLICATION RECEIVED</p><p style="font-family:var(--font-kr);font-size:1.1rem;font-weight:300;line-height:2;color:var(--black);">지원서가 성공적으로 제출되었습니다.<br>검토 후 개별 연락드리겠습니다.</p><a href="landing.html" style="margin-top:1rem;padding:0.75rem 2rem;background:#0a0a0a;color:#fff;border:none;cursor:pointer;font-family:var(--font-kr);font-size:0.85rem;letter-spacing:0.05em;text-decoration:none;display:inline-block;">채용 페이지로 돌아가기</a></div>';
        } else {
          submitBtn.textContent = 'Submit →'; submitBtn.disabled = false;
          alert('제출에 실패했습니다. 다시 시도해 주세요.');
        }
      } catch (err) {
        submitBtn.textContent = 'Submit →'; submitBtn.disabled = false;
        alert('네트워크 오류가 발생했습니다. 다시 시도해 주세요.');
      }
    });
  </script>
</body>
</html>
